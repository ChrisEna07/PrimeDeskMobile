name: primedesk_mobile
description: "Sistema de gestión para Rafa Motos - PrimeDesk"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.0.0 # Bajamos un poco el requerimiento del SDK para mayor compatibilidad

dependencies:
  flutter:
    sdk: flutter

  # Iconos y Estilo
  cupertino_icons: ^1.0.8
  lucide_icons: ^0.257.0 # Usamos la versión sugerida por tu terminal

  # Base de Datos y Configuración
  supabase_flutter: ^2.6.0
  flutter_dotenv: ^5.2.1

  # Visualización de Datos (Gráficas)
  fl_chart: ^0.66.0 

  # Utilidades
  intl: ^0.19.0
  provider: ^6.1.5+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: "^0.13.1"

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"


flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/icon.png